<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Administrativo | JAC Florida Las Mercedes</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  
  <style>
    body { font-family: 'Poppins', sans-serif; background-color: #f8f9fa; }
    .card { border: none; border-radius: 12px; }
    .card-header { font-weight: 600; }
  </style>
</head>

<body>

  <main class="container my-5" style="max-width: 950px;">
    
    <header class="d-flex justify-content-between align-items-center border-bottom pb-4 mb-4">
      <div>
        <h1 class="h2 m-0 text-dark fw-bold">Panel Administrativo</h1>
        <p class="text-muted m-0 small">JAC Florida Las Mercedes</p>
      </div>
      <button id="logoutBtn" class="btn btn-outline-danger px-4 fw-medium">
        Cerrar sesión
      </button>
    </header>

    <section class="mb-5">
      <div class="card shadow-sm">
        <div class="card-header bg-primary text-white py-3">
          <h5 class="m-0 fs-5">📰 Crear nueva noticia</h5>
        </div>
        <div class="card-body p-4">
          <form id="newsForm">
            <div class="mb-3">
              <label for="titulo" class="form-label fw-medium text-secondary">Título de la noticia</label>
              <input type="text" id="titulo" class="form-control" placeholder="Ej: Nueva jornada de vacunación" required>
            </div>

            <div class="mb-3">
              <label for="imagen" class="form-label fw-medium text-secondary">URL de la imagen</label>
              <input type="url" id="imagen" class="form-control" placeholder="https://ejemplo.com/imagen.jpg" required>
            </div>

            <div class="mb-3">
              <label for="contenido" class="form-label fw-medium text-secondary">Contenido de la publicación</label>
              <textarea id="contenido" class="form-control" placeholder="Escribe los detalles aquí..." rows="5" required></textarea>
            </div>

            <button type="submit" class="btn btn-primary px-4 fw-medium">
              Guardar noticia
            </button>
          </form>
        </div>
      </div>
    </section>

    <section class="mb-5">
      <h3 class="h4 text-dark fw-bold mb-3">Noticias registradas</h3>
      <div id="newsList" class="row g-3"></div>
    </section>

    <hr class="my-5">

    <section class="mb-5">
      <div class="card shadow-sm">
        <div class="card-header bg-success text-white py-3">
          <h5 class="m-0 fs-5">🖼️ Gestionar Galería Comunal</h5>
        </div>
        <div class="card-body p-4">
          <form id="galeriaForm">
            <div class="mb-3">
              <label for="galeriaTitulo" class="form-label fw-medium text-secondary">Título de la foto</label>
              <input type="text" id="galeriaTitulo" class="form-control" placeholder="Ej: Entrega de kits escolares" required>
            </div>

            <div class="form-group mb-3">
              <label for="galeriaDescripcion" class="form-label">Descripción de la foto</label>
              <textarea id="galeriaDescripcion" class="form-control" rows="3" placeholder="Escribe una breve descripción de la actividad..." required></textarea>
            </div>

            <div class="mb-3">
              <label for="galeriaImagen" class="form-label fw-medium text-secondary">Enlace (URL) de la imagen</label>
              <input type="url" id="galeriaImagen" class="form-control" placeholder="https://i.ibb.co/ejemplo/foto.jpg" required>
              <div class="form-text mt-2">
                Puedes subir la foto de alta calidad en <a href="https://imgbb.com/" target="_blank" class="text-decoration-none fw-semibold">ImgBB</a> y pegar el "Enlace directo" aquí.
              </div>
            </div>

            <button type="submit" class="btn btn-success px-4 fw-medium">
              Añadir a la Galería
            </button>
          </form>
        </div>
      </div>

      <h4 class="h5 text-dark fw-bold mt-4 mb-3">Imágenes registradas en la web (Más recientes primero)</h4>
      <div id="listaGaleria" class="row g-3"></div>
    </section>

    <hr class="my-5">

    <section class="mb-5">
      <h3 class="h4 text-dark fw-bold mb-3">📩 PQRSF recibidas</h3>
      <div id="lista-pqrs" class="row g-3"></div>
    </section>

  </main>

  <script type="module" src="../../js/admin/dashboard.js"></script>

</body>
</html>
